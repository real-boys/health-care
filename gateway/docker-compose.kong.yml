version: '3.8'

services:
  kong-database:
    image: postgres:13
    container_name: healthcare_kong_db
    environment:
      POSTGRES_USER: kong
      POSTGRES_PASSWORD: ${KONG_DB_PASSWORD:-kong_secret}
      POSTGRES_DB: kong
    volumes:
      - kong_data:/var/lib/postgresql/data
    networks:
      - healthcare_network
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "kong"]
      interval: 10s
      timeout: 5s
      retries: 5

  kong-migrations:
    image: kong:latest
    container_name: healthcare_kong_migrations
    depends_on:
      kong-database:
        condition: service_healthy
    environment:
      KONG_DATABASE: postgres
      KONG_PG_HOST: kong-database
      KONG_PG_PASSWORD: ${KONG_DB_PASSWORD:-kong_secret}
      KONG_PASSWORD: ${KONG_ADMIN_PASSWORD:-kong_admin_secret}
    command: kong migrations bootstrap
    networks:
      - healthcare_network

  kong:
    image: kong:latest
    container_name: healthcare_kong
    depends_on:
      kong-migrations:
        condition: service_completed_successfully
    environment:
      KONG_DATABASE: postgres
      KONG_PG_HOST: kong-database
      KONG_PG_PASSWORD: ${KONG_DB_PASSWORD:-kong_secret}
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      KONG_ADMIN_LISTEN: '0.0.0.0:8001'
      KONG_ADMIN_GUI_URL: http://localhost:8002
      KONG_PROXY_LISTEN: '0.0.0.0:8000, 0.0.0.0:8443 ssl'
      KONG_PLUGINS: bundled,jwt,rate-limiting,cors,request-transformer,response-transformer
      KONG_DECLARATIVE_CONFIG: /etc/kong/kong.yml
    ports:
      - "8000:8000"   # HTTP Proxy
      - "8443:8443"   # HTTPS Proxy
      - "8001:8001"   # Admin API
      - "8002:8002"   # Admin GUI
    volumes:
      - ./kong.yml:/etc/kong/kong.yml:ro
      - ./kong/plugins:/usr/local/kong/js-plugins:ro
    networks:
      - healthcare_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/status"]
      interval: 10s
      timeout: 5s
      retries: 5

  konga:
    image: pantsel/konga:latest
    container_name: healthcare_konga
    depends_on:
      kong:
        condition: service_healthy
    environment:
      NODE_ENV: production
      KONGA_HOOK_TIMEOUT: 10000
      DB_ADAPTER: postgres
      DB_HOST: kong-database
      DB_USER: kong
      DB_PASSWORD: ${KONG_DB_PASSWORD:-kong_secret}
      DB_DATABASE: konga
      TOKEN_SECRET: ${KONGA_TOKEN_SECRET:-konga_super_secret}
    ports:
      - "1337:1337"
    networks:
      - healthcare_network

  redis:
    image: redis:7-alpine
    container_name: healthcare_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - healthcare_network
    command: redis-server --appendonly yes

networks:
  healthcare_network:
    driver: bridge

volumes:
  kong_data:
  redis_data:
